# Build Vite → copy into BookstoreAPI/wwwroot → publish ASP.NET Core → deploy to App Service (single host).
# Docs: https://github.com/Azure/webapps-deploy

name: Build and deploy ASP.Net Core app to Azure Web App - Mission13

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: bookstore-app/package-lock.json

      - name: Install frontend dependencies
        working-directory: bookstore-app
        run: npm ci

      - name: Build frontend (API on same origin as SPA)
        working-directory: bookstore-app
        env:
          VITE_API_BASE_URL: __SAME_ORIGIN__
        run: npm run build

      - name: Copy SPA into API wwwroot
        run: |
          rm -rf BookstoreAPI/wwwroot
          mkdir -p BookstoreAPI/wwwroot
          cp -r bookstore-app/dist/. BookstoreAPI/wwwroot/

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish API (includes wwwroot)
        run: dotnet publish BookstoreAPI/BookstoreAPI.csproj -c Release -o ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0D2FBC3FD49A43A299BCCA47A7E3B4E3 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_7EBA3470585D4B0282DE6C47FEDA8A1D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A606DEA3DC0C4B1388507AD3D77C86E5 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Mission13'
          slot-name: 'Production'
          package: publish
